                - generic [ref=e596]: Section titled “1.1 Purpose”
            - paragraph [ref=e597]: AIC provides a single monetary-normalized metric for inference cost across supported model providers. This specification defines how conforming implementations compute AIC, how pricing data is represented, and how Copilot-specific pricing alignment is governed.
            - generic [ref=e598]:
              - heading "1.2 Scope" [level=3] [ref=e599]
