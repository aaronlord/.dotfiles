              - heading "9.6 Value Validation" [level=3] [ref=e1180]
              - link "Section titled “9.6 Value Validation”" [ref=e1181] [cursor=pointer]:
                - /url: "#96-value-validation"
                - img [ref=e1183]
                - generic [ref=e1185]: Section titled “9.6 Value Validation”
            - paragraph [ref=e1186]: "A conforming implementation MUST enforce the following at compile time:"
            - list [ref=e1187]:
              - listitem [ref=e1188]: Accept positive integers and positive numeric strings.
              - listitem [ref=e1189]:
                - text: Accept the suffix notation
                - code [ref=e1190]: K
                - text: and
                - code [ref=e1191]: M
                - text: (case-insensitive) as multipliers (×1,000 and ×1,000,000 respectively).
              - listitem [ref=e1192]:
                - text: Accept
                - code [ref=e1193]: "-1"
                - text: as the explicit disable sentinel.
              - listitem [ref=e1194]: Accept GitHub Actions expression strings (verbatim, passed through for runtime evaluation).
              - listitem [ref=e1195]:
                - text: Reject integer values below
                - code [ref=e1196]: "-1"
                - text: with a compile-time validation error.
              - listitem [ref=e1197]: Reject non-numeric, non-expression values.
