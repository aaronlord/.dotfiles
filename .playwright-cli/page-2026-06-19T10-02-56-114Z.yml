            - paragraph [ref=e605]: "This specification covers:"
            - list [ref=e606]:
              - listitem [ref=e607]: The normative AIC unit definition and conversion rules.
              - listitem [ref=e608]: The per-invocation and aggregated AIC calculation formulas.
              - listitem [ref=e609]:
                - text: Required
                - code [ref=e610]: models.json
                - text: data structure and field semantics.
              - listitem [ref=e611]: Requirements for how pricing catalog data is provided and mirrored in gh-aw.
              - listitem [ref=e612]: Required references to GitHub Copilot model and billing documentation.
            - paragraph [ref=e613]: "This specification does NOT cover:"
            - list [ref=e614]:
              - listitem [ref=e615]: GitHub Actions minutes billing.
              - listitem [ref=e616]: ET (Effective Tokens) normalization rules.
              - listitem [ref=e617]: Provider-side billing reconciliation and invoice dispute procedures.
            - generic [ref=e618]:
              - heading "1.3 Design Goals" [level=3] [ref=e619]
              - link "Section titled “1.3 Design Goals”" [ref=e620] [cursor=pointer]:
