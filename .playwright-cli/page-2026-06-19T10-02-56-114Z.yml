              - heading "9. Daily AI Credits Guardrail" [level=2] [ref=e1085]
              - link "Section titled “9. Daily AI Credits Guardrail”" [ref=e1086] [cursor=pointer]:
                - /url: "#9-daily-ai-credits-guardrail"
                - img [ref=e1088]
                - generic [ref=e1090]: Section titled “9. Daily AI Credits Guardrail”
            - generic [ref=e1091]:
              - heading "9.1 Purpose" [level=3] [ref=e1092]
              - link "Section titled “9.1 Purpose”" [ref=e1093] [cursor=pointer]:
                - /url: "#91-purpose"
                - img [ref=e1095]
                - generic [ref=e1097]: Section titled “9.1 Purpose”
            - paragraph [ref=e1098]: The daily AI Credits guardrail is a per-workflow cumulative budget limit evaluated at action runtime. It prevents a single workflow from consuming excessive AI Credits across all runs in a rolling 24-hour window. This section specifies the normative resolution order for the guardrail threshold and the mechanism by which the runtime default is resolved.
            - generic [ref=e1099]:
              - heading "9.2 Guardrail Configuration Field" [level=3] [ref=e1100]
              - link "Section titled “9.2 Guardrail Configuration Field”" [ref=e1101] [cursor=pointer]:
                - /url: "#92-guardrail-configuration-field"
                - img [ref=e1103]
                - generic [ref=e1105]: Section titled “9.2 Guardrail Configuration Field”
            - paragraph [ref=e1106]:
              - text: The guardrail threshold is expressed through the
              - code [ref=e1107]: max-daily-ai-credits
              - text: frontmatter field in the workflow YAML source. When set, a conforming compiler MUST emit the resolved threshold as the
              - code [ref=e1108]: GH_AW_MAX_DAILY_AI_CREDITS
              - text: environment variable in the compiled workflow YAML. The daily guardrail check step MUST gate its execution on this variable being non-empty.
            - generic [ref=e1109]:
              - heading "9.3 Normative Resolution Order" [level=3] [ref=e1110]
              - link "Section titled “9.3 Normative Resolution Order”" [ref=e1111] [cursor=pointer]:
                - /url: "#93-normative-resolution-order"
                - img [ref=e1113]
                - generic [ref=e1115]: Section titled “9.3 Normative Resolution Order”
            - paragraph [ref=e1116]: "A conforming implementation MUST resolve the effective daily AI Credits threshold using the following precedence (highest to lowest):"
            - list [ref=e1117]:
              - listitem [ref=e1118]:
                - paragraph [ref=e1119]:
                  - strong [ref=e1120]: Frontmatter value
                  - text: (
                  - code [ref=e1121]: max-daily-ai-credits
                  - text: "): Resolved at compile time. Numeric values MUST be normalized to integer strings; suffix notation ("
                  - code [ref=e1122]: K
                  - text: ","
                  - code [ref=e1123]: M
                  - text: ) MUST be expanded (e.g.,
                  - code [ref=e1124]: 100M
                  - text: →
                  - code [ref=e1125]: "100000000"
                  - text: ). When present, the resolved value MUST be emitted literally as the
                  - code [ref=e1126]: GH_AW_MAX_DAILY_AI_CREDITS
                  - text: value.
              - listitem [ref=e1127]:
                - paragraph [ref=e1128]:
                  - strong [ref=e1129]: Imported workflow configuration
                  - text: (
                  - code [ref=e1130]: max-daily-ai-credits
                  - text: "from imported shared workflows): Resolved at compile time using a first-wins accumulation across all imported workflows. A conforming implementation MUST apply the first usable"
                  - code [ref=e1131]: max-daily-ai-credits
                  - text: value found across imports when no frontmatter value is present on the main workflow. Imported values undergo the same normalization and validation rules as frontmatter values.
              - listitem [ref=e1132]:
                - paragraph [ref=e1133]:
                  - strong [ref=e1134]: Runtime organization variable
                  - text: (
                  - code [ref=e1135]: vars.GH_AW_DEFAULT_MAX_DAILY_AI_CREDITS
                  - text: "): A GitHub Actions"
                  - code [ref=e1136]: vars.*
                  - text: expression resolved at action runtime by the GitHub Actions runner. A conforming implementation MUST NOT read this variable at compile time via the process environment; it MUST instead be embedded in the compiled YAML as a GitHub Actions expression evaluated by the runner.
              - listitem [ref=e1137]:
                - paragraph [ref=e1138]:
                  - strong [ref=e1139]: Built-in constant default
                  - text: (
                  - code [ref=e1140]: "5000"
                  - text: "): The fallback literal embedded in the GitHub Actions expression when the organization variable is unset. The value"
                  - code [ref=e1141]: "5000"
                  - text: AIC represents the normative built-in default for the daily guardrail threshold.
            - paragraph [ref=e1142]:
              - text: A conforming implementation MUST NOT resolve any of these values from repository-local configuration files (e.g.,
              - code [ref=e1143]: aw.json
              - text: ).
            - generic [ref=e1144]:
              - heading "9.4 Emitted Expression Form" [level=3] [ref=e1145]
              - link "Section titled “9.4 Emitted Expression Form”" [ref=e1146] [cursor=pointer]:
                - /url: "#94-emitted-expression-form"
                - img [ref=e1148]
                - generic [ref=e1150]: Section titled “9.4 Emitted Expression Form”
            - paragraph [ref=e1151]:
              - text: When neither a frontmatter value nor an imported workflow configuration value is present, a conforming implementation MUST emit the following GitHub Actions expression as the
              - code [ref=e1152]: GH_AW_MAX_DAILY_AI_CREDITS
              - text: "environment variable value in the compiled workflow:"
            - figure [ref=e1154]:
              - code [ref=e1156]:
                - generic [ref=e1158]: "${{ vars.GH_AW_DEFAULT_MAX_DAILY_AI_CREDITS || '5000' }}"
              - button "Copy to clipboard" [ref=e1160] [cursor=pointer]
            - paragraph [ref=e1162]:
              - text: This expression MUST be emitted verbatim (not pre-evaluated) so that the GitHub Actions runner resolves the organization variable at workflow execution time. The
              - code [ref=e1163]: "'5000'"
              - text: fallback ensures the guardrail is active by default when the organization variable is not configured.
            - generic [ref=e1164]:
              - heading "9.5 Disable Sentinel" [level=3] [ref=e1165]
              - link "Section titled “9.5 Disable Sentinel”" [ref=e1166] [cursor=pointer]:
                - /url: "#95-disable-sentinel"
                - img [ref=e1168]
                - generic [ref=e1170]: Section titled “9.5 Disable Sentinel”
            - paragraph [ref=e1171]:
              - text: A
              - code [ref=e1172]: max-daily-ai-credits
              - text: frontmatter value of
              - code [ref=e1173]: "-1"
              - text: "MUST disable the daily guardrail. When this sentinel is present:"
            - list [ref=e1174]:
              - listitem [ref=e1175]:
                - text: A conforming implementation MUST NOT emit
                - code [ref=e1176]: GH_AW_MAX_DAILY_AI_CREDITS
                - text: into the compiled workflow.
              - listitem [ref=e1177]:
                - text: The daily guardrail check step MUST be skipped at runtime (its
                - code [ref=e1178]: "if:"
                - text: condition evaluates to false).
