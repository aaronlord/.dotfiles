                - generic [ref=e624]: Section titled “1.3 Design Goals”
            - paragraph [ref=e625]: "The specification is designed to:"
            - list [ref=e626]:
              - listitem [ref=e627]: Provide a testable and deterministic calculation contract.
              - listitem [ref=e628]: Keep pricing inputs explicit and auditable through structured catalog files.
              - listitem [ref=e629]: Support model-name drift through normalized lookup and prefix fallback matching.
              - listitem [ref=e630]: Maintain compatibility between CLI and setup runtime pricing catalogs.
