            - paragraph [ref=e1394]: The per-run AI Credits budget is a per-invocation credit limit applied by the AWF firewall to each individual workflow run. It prevents a single run from consuming excessive AI Credits regardless of daily aggregate usage. This section specifies the normative resolution order for the budget threshold and the mechanism by which the runtime default is resolved.
            - generic [ref=e1395]:
              - heading "10.2 Budget Configuration Field" [level=3] [ref=e1396]
              - link "Section titled “10.2 Budget Configuration Field”" [ref=e1397] [cursor=pointer]:
                - /url: "#102-budget-configuration-field"
                - img [ref=e1399]
                - generic [ref=e1401]: Section titled “10.2 Budget Configuration Field”
            - paragraph [ref=e1402]:
              - text: The budget threshold is expressed through the
              - code [ref=e1403]: max-ai-credits
              - text: frontmatter field in the workflow YAML source. When set, a conforming compiler MUST bake the resolved integer threshold directly into the AWF firewall configuration JSON emitted by the compiled workflow. When not set, a conforming implementation MUST resolve the threshold at action runtime using the mechanism specified in §10.4.
            - generic [ref=e1404]:
              - heading "10.3 Normative Resolution Order" [level=3] [ref=e1405]
              - link "Section titled “10.3 Normative Resolution Order”" [ref=e1406] [cursor=pointer]:
                - /url: "#103-normative-resolution-order"
                - img [ref=e1408]
                - generic [ref=e1410]: Section titled “10.3 Normative Resolution Order”
            - paragraph [ref=e1411]: "A conforming implementation MUST resolve the effective per-run AI Credits budget using the following precedence (highest to lowest):"
            - list [ref=e1412]:
              - listitem [ref=e1413]:
                - paragraph [ref=e1414]:
                  - strong [ref=e1415]: Frontmatter value
                  - text: (
                  - code [ref=e1416]: max-ai-credits
                  - text: "): Resolved at compile time. Numeric values MUST be normalized to integers; suffix notation ("
                  - code [ref=e1417]: K
                  - text: ","
                  - code [ref=e1418]: M
                  - text: ) MUST be expanded (e.g.,
                  - code [ref=e1419]: 1M
                  - text: →
                  - code [ref=e1420]: "1000000"
                  - text: ). When present, the resolved integer MUST be baked into the AWF firewall config JSON at compile time.
              - listitem [ref=e1421]:
                - paragraph [ref=e1422]:
                  - strong [ref=e1423]: Imported workflow configuration
                  - text: (
                  - code [ref=e1424]: max-ai-credits
                  - text: "from imported shared workflows): Resolved at compile time using a first-wins accumulation across all imported workflows. A conforming implementation MUST apply the first usable"
                  - code [ref=e1425]: max-ai-credits
                  - text: value found across imports when no frontmatter value is present on the main workflow. Imported values undergo the same normalization rules as frontmatter values.
              - listitem [ref=e1426]:
                - paragraph [ref=e1427]:
                  - strong [ref=e1428]: Runtime organization variable
                  - text: (
                  - code [ref=e1429]: vars.GH_AW_DEFAULT_MAX_AI_CREDITS
                  - text: "): A GitHub Actions"
                  - code [ref=e1430]: vars.*
                  - text: expression resolved at action runtime by the GitHub Actions runner. A conforming implementation MUST NOT read this variable at compile time via the process environment; it MUST instead embed a GitHub Actions expression evaluated by the runner at execution time.
              - listitem [ref=e1431]:
                - paragraph [ref=e1432]:
                  - strong [ref=e1433]: Built-in constant default
                  - text: (
                  - code [ref=e1434]: "1000"
                  - text: "): The fallback literal embedded in the GitHub Actions expression when the organization variable is unset. The value"
                  - code [ref=e1435]: "1000"
                  - text: AIC represents the normative built-in default for the per-run budget.
            - paragraph [ref=e1436]:
